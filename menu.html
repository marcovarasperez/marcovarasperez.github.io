<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>TFG RPG — Menú Principal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@700&family=Crimson+Text:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c9a84c;
            --gold-light: #f0d080;
            --dark-bg: #05080f;
            --card-bg: rgba(8, 12, 22, 0.80);
            --border: rgba(201,168,76,0.28);
            --text: #e8dcc8;
            --text-dim: #9a8a6a;
        }

        body {
            background: var(--dark-bg);
            font-family: 'Crimson Text', Georgia, serif;
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            position: relative;
        }

        .bg-image   { position: fixed; inset: 0; z-index: 0; background: url('./img/fondo/fondo.png') no-repeat center center / cover; }
        .bg-overlay { position: fixed; inset: 0; z-index: 1; background: linear-gradient(to bottom, rgba(5,8,15,0.70) 0%, rgba(5,8,15,0.55) 50%, rgba(5,8,15,0.80) 100%); }
        .bg-vignette{ position: fixed; inset: 0; z-index: 2; background: radial-gradient(ellipse at center, transparent 25%, rgba(0,0,0,0.65) 100%); }
        #particles  { position: fixed; inset: 0; z-index: 3; pointer-events: none; }

        .page-content {
            position: relative; z-index: 10;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            padding: 32px 0;
        }

        .hero-greeting {
            font-family: 'Cinzel', serif;
            font-size: clamp(0.58rem, 2vw, 0.7rem);
            letter-spacing: 0.35em;
            color: var(--gold);
            opacity: 0.8;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        .hero-name {
            font-family: 'Cinzel Decorative', serif;
            font-size: clamp(1.8rem, 6vw, 3.2rem);
            font-weight: 700;
            background: linear-gradient(160deg, #f0d080 0%, #c9a84c 45%, #8b6914 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 24px rgba(201,168,76,0.3));
            line-height: 1.1;
        }
        .ornament-row {
            display: flex; align-items: center; justify-content: center; gap: 14px;
            margin: 14px auto; max-width: 300px;
        }
        .ornament-row .line { flex: 1; height: 1px; background: linear-gradient(to right, transparent, rgba(201,168,76,0.5)); }
        .ornament-row .line:last-child { background: linear-gradient(to left, transparent, rgba(201,168,76,0.5)); }
        .ornament-row .gem { width: 7px; height: 7px; background: var(--gold); transform: rotate(45deg); flex-shrink: 0; }
        .hero-subtitle { font-style: italic; color: var(--text-dim); font-size: clamp(0.95rem, 3vw, 1.05rem); }

        .stat-item {
            background: rgba(8,12,22,0.65);
            border: 1px solid rgba(201,168,76,0.15);
            border-radius: 2px;
            padding: 10px 20px;
            text-align: center;
            min-width: 80px;
        }
        .stat-value { font-family: 'Cinzel', serif; font-size: clamp(0.95rem, 3vw, 1.1rem); color: var(--gold); display: block; }
        .stat-label { font-size: clamp(0.58rem, 2vw, 0.7rem); letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-dim); margin-top: 2px; display: block; }

        .menu-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px) saturate(1.4);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: clamp(24px, 4vw, 36px) clamp(16px, 3vw, 24px);
            cursor: pointer;
            text-decoration: none;
            color: var(--text);
            transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeInUp 0.7s cubic-bezier(0.16,1,0.3,1) both;
        }
        .menu-card:nth-child(1) { animation-delay: 0.1s; }
        .menu-card:nth-child(2) { animation-delay: 0.2s; }
        .menu-card::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(201,168,76,0.06) 0%, transparent 60%); opacity: 0; transition: opacity 0.35s; }
        .menu-card::after  { content: ''; position: absolute; bottom: 0; left: 10%; right: 10%; height: 2px; background: linear-gradient(to right, transparent, var(--gold), transparent); transform: scaleX(0); transition: transform 0.35s; }
        .menu-card:hover { transform: translateY(-8px); border-color: rgba(201,168,76,0.55); box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 30px rgba(201,168,76,0.08); color: var(--text); }
        .menu-card:hover::before { opacity: 1; }
        .menu-card:hover::after  { transform: scaleX(1); }
        .menu-card .c-tl, .menu-card .c-br { position: absolute; width: 16px; height: 16px; border-color: rgba(201,168,76,0.4); border-style: solid; }
        .menu-card .c-tl { top: 7px; left: 7px; border-width: 1px 0 0 1px; }
        .menu-card .c-br { bottom: 7px; right: 7px; border-width: 0 1px 1px 0; }

        .card-icon { width: clamp(52px, 10vw, 64px); height: clamp(52px, 10vw, 64px); background: rgba(201,168,76,0.08); border: 1px solid rgba(201,168,76,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: clamp(1.4rem, 4vw, 1.8rem); margin-bottom: 16px; transition: all 0.35s; }
        .menu-card:hover .card-icon { background: rgba(201,168,76,0.14); border-color: rgba(201,168,76,0.45); box-shadow: 0 0 20px rgba(201,168,76,0.15); transform: scale(1.08); }
        .card-title { font-family: 'Cinzel', serif; font-size: clamp(0.85rem, 2.5vw, 1rem); font-weight: 600; letter-spacing: 0.08em; color: var(--gold-light); margin-bottom: 8px; }
        .card-desc  { font-size: clamp(0.82rem, 2.5vw, 0.9rem); color: var(--text-dim); font-style: italic; line-height: 1.4; text-align: center; }

        .btn-logout {
            background: transparent;
            border: 1px solid rgba(185,40,40,0.4);
            border-radius: 2px;
            padding: 10px 28px;
            color: #e57575;
            font-family: 'Cinzel', serif;
            font-size: clamp(0.58rem, 2vw, 0.65rem);
            letter-spacing: 0.2em; text-transform: uppercase;
            cursor: pointer; transition: all 0.3s;
            min-height: 44px;
        }
        .btn-logout:hover { background: rgba(185,40,40,0.18); border-color: rgba(185,40,40,0.7); color: #ff9090; }

        @keyframes fadeInDown { from { opacity:0; transform:translateY(-20px); } to { opacity:1; transform:translateY(0); } }
        @keyframes fadeInUp   { from { opacity:0; transform:translateY(20px);  } to { opacity:1; transform:translateY(0); } }
        @keyframes fadeIn     { from { opacity:0; } to { opacity:1; } }
    </style>
</head>
<body>

<div class="bg-image"></div>
<div class="bg-overlay"></div>
<div class="bg-vignette"></div>
<canvas id="particles"></canvas>

<div class="page-content">
    <div class="container">

        <!-- Header -->
        <div class="text-center mb-4 mb-md-5" style="animation: fadeInDown 0.7s cubic-bezier(0.16,1,0.3,1) both">
            <div class="hero-greeting">Bienvenido de vuelta, Héroe</div>
            <div class="hero-name" id="user-display">—</div>
            <div class="ornament-row">
                <div class="line"></div>
                <div class="gem"></div>
                <div class="gem" style="width:5px;height:5px;opacity:0.6;"></div>
                <div class="gem"></div>
                <div class="line"></div>
            </div>
            <div class="hero-subtitle">¿Qué deseas hacer hoy?</div>
        </div>

        <!-- Stats -->
        <div class="d-flex flex-wrap justify-content-center gap-2 gap-md-3 mb-4 mb-md-5"
             style="animation: fadeIn 0.7s 0.35s both">
            <div class="stat-item">
                <span class="stat-value" id="stat-slots">—</span>
                <span class="stat-label">Partidas Guardadas</span>
            </div>
            <div class="stat-item">
                <span class="stat-value" id="stat-email">—</span>
                <span class="stat-label">Correo</span>
            </div>
        </div>

        <!-- Tarjetas -->
        <div class="row g-3 justify-content-center mb-4 mb-md-5">
            <div class="col-10 col-sm-8 col-md-5 col-lg-4">
                <a href="game.html" class="menu-card h-100">
                    <div class="c-tl"></div>
                    <div class="c-br"></div>
                    <div class="card-icon">⚔️</div>
                    <div class="card-title">Continuar Aventura</div>
                    <div class="card-desc">Retoma tu viaje desde donde lo dejaste</div>
                </a>
            </div>
            <div class="col-10 col-sm-8 col-md-5 col-lg-4">
                <a href="account.html" class="menu-card h-100">
                    <div class="c-tl"></div>
                    <div class="c-br"></div>
                    <div class="card-icon">⚙️</div>
                    <div class="card-title">Mi Cuenta</div>
                    <div class="card-desc">Perfil, seguridad y configuración personal</div>
                </a>
            </div>
        </div>

        <!-- Logout -->
        <div class="text-center" style="animation: fadeIn 0.7s 0.5s both">
            <button class="btn-logout" onclick="cerrarSesion()">✖ &nbsp; Cerrar Sesión</button>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_BASE = "http://marcovarasperez.duckdns.org/api/jugadores";
    const usuario = localStorage.getItem('rpg_usuario');
    if (!usuario) { window.location.href = 'index.html'; }

    document.getElementById('user-display').textContent = usuario;

    async function loadStats() {
        try {
            // Datos del jugador
            const resJugador = await fetch(`${API_BASE}/usuario/${encodeURIComponent(usuario)}`);
            if (resJugador.ok) {
                const data = await resJugador.json();
                const email = data.email || '—';
                // Mostrar solo dominio para no ocupar demasiado espacio
                const emailCorto = email.length > 20 ? email.split('@')[1] || email : email;
                document.getElementById('stat-email').textContent = emailCorto;
            }

            // Slots de guardado
            const resSlots = await fetch(`${API_BASE}/guardado/${encodeURIComponent(usuario)}/slots`);
            if (resSlots.ok) {
                const slots = await resSlots.json();
                document.getElementById('stat-slots').textContent = slots.length || 0;
            } else {
                document.getElementById('stat-slots').textContent = '0';
            }
        } catch { /* silently fail */ }
    }
    loadStats();

    function cerrarSesion() {
        localStorage.clear();
        window.location.href = 'index.html';
    }

    (function() {
        const canvas = document.getElementById('particles');
        const ctx    = canvas.getContext('2d');
        let W, H, pts = [];
        function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();
        for (let i = 0; i < 50; i++) pts.push({ x:Math.random()*W, y:Math.random()*H, r:Math.random()*1.1+0.3, spd:Math.random()*0.2+0.05, drift:(Math.random()-0.5)*0.1 });
        function frame() {
            ctx.clearRect(0,0,W,H);
            pts.forEach(p => {
                const a = 0.2 + 0.5 * Math.abs(Math.sin(Date.now()*0.0008 + p.x));
                ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
                ctx.fillStyle = `rgba(201,168,76,${a})`; ctx.fill();
                p.y -= p.spd; p.x += p.drift;
                if (p.y < -5) { p.y = H+5; p.x = Math.random()*W; }
                if (p.x < 0 || p.x > W) p.drift *= -1;
            });
            requestAnimationFrame(frame);
        }
        frame();
    })();
</script>
</body>
</html>
