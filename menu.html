<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TFG RPG - Menú</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;800&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.7)),
                        url('https://picsum.photos/id/104/1920/1080') no-repeat center center fixed;
            background-size: cover;
            color: white; font-family: 'Inter', sans-serif;
            min-height: 100vh; display: flex; align-items: center;
        }
        .menu-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; transition: 0.3s; cursor: pointer; text-decoration: none; color: white;
        }
        .menu-card:hover { background: rgba(99, 102, 241, 0.2); border-color: #6366f1; transform: translateY(-10px); }
        .icon-circle { width: 60px; height: 60px; background: rgba(99, 102, 241, 0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin-bottom: 1rem; }
    </style>
</head>
<body>
<div class="container text-center">
    <h1 class="display-4 fw-bold mb-5">Bienvenido, <span id="user-display" class="text-primary">Jugador</span></h1>
    <div class="row g-4 justify-content-center">
        <div class="col-12 col-md-4">
            <a href="game.html" class="card menu-card p-4">
                <div class="icon-circle mx-auto">⚔️</div>
                <h3>Jugar</h3>
                <p class="text-secondary small">Continuar aventura</p>
            </a>
        </div>
        <div class="col-12 col-md-4">
            <a href="account.html" class="card menu-card p-4">
                <div class="icon-circle mx-auto">⚙️</div>
                <h3>Mi Cuenta</h3>
                <p class="text-secondary small">Perfil y seguridad</p>
            </a>
        </div>
    </div>
    <div class="mt-5">
        <button class="btn btn-outline-danger" onclick="logout()">Cerrar Sesión</button>
    </div>
</div>
<script>
    const user = localStorage.getItem("rpg_usuario");
    if(!user) window.location.href = "index.html";
    document.getElementById("user-display").textContent = user;
    function logout() { localStorage.clear(); window.location.href = "index.html"; }
</script>
</body>
</html>
