<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TFG RPG - Menú</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.7)),
                        url('img/fondo.png') no-repeat center center fixed;
            background-size: cover;
            color: white; font-family: 'Inter', sans-serif;
            min-height: 100vh; display: flex; align-items: center; margin: 0;
        }
        .menu-card {
            background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; transition: 0.4s; text-decoration: none; color: white;
        }
        .menu-card:hover { 
            background: rgba(99, 102, 241, 0.25); 
            border-color: #6366f1; 
            transform: translateY(-8px);
            color: white;
        }
        .icon { font-size: 3rem; margin-bottom: 1rem; display: block; }
    </style>
</head>
<body>
    <div class="container text-center">
        <h1 class="display-3 fw-bold mb-5">Bienvenido, <span id="user-tag" class="text-primary">...</span></h1>
        
        <div class="row g-4 justify-content-center">
            <div class="col-md-5">
                <a href="game.html" class="card menu-card p-5">
                    <span class="icon">⚔️</span>
                    <h2>Jugar</h2>
                    <p class="text-secondary">Continúa tu aventura en el RPG</p>
                </a>
            </div>
            <div class="col-md-5">
                <a href="account.html" class="card menu-card p-5">
                    <span class="icon">⚙️</span>
                    <h2>Configuración</h2>
                    <p class="text-secondary">Gestiona tu perfil y seguridad</p>
                </a>
            </div>
        </div>
        
        <div class="mt-5">
            <button class="btn btn-outline-danger" onclick="cerrarSesion()">Cerrar Sesión</button>
        </div>
    </div>

    <script>
        const usuario = localStorage.getItem("rpg_usuario");
        if (!usuario) window.location.href = "index.html";
        document.getElementById("user-tag").textContent = usuario;

        function cerrarSesion() {
            localStorage.clear();
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
