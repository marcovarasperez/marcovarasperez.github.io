<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TFG RPG - Acceso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.8);
            --primary-glow: #6366f1;
        }

        body {
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            font-family: 'Inter', sans-serif;
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .auth-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            padding: 2rem;
        }

        .nav-pills .nav-link {
            color: #94a3b8;
            font-weight: 600;
            border-radius: 10px;
            transition: 0.3s;
        }

        .nav-pills .nav-link.active {
            background-color: var(--primary-glow);
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        .form-control {
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 0.75rem;
        }

        .form-control:focus {
            background: rgba(15, 23, 42, 1);
            border-color: var(--primary-glow);
            color: white;
            box-shadow: 0 0 0 0.25rem rgba(99, 102, 241, 0.25);
        }

        .btn-primary { background: var(--primary-glow); border: none; font-weight: 700; }
        .btn-primary:hover { background: #4f46e5; transform: translateY(-1px); }
        
        .gradient-text {
            background: linear-gradient(to right, #818cf8, #e066ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-md-6 col-lg-5">
            <div class="auth-card">
                <h1 class="text-center gradient-text mb-4">TFG RPG</h1>
                
                <ul class="nav nav-pills nav-fill mb-4" id="pills-tab" role="tablist">
                    <li class="nav-item">
                        <button class="nav-link active" id="tab-login" data-bs-toggle="pill" data-bs-target="#panel-login">LOGIN</button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" id="tab-reg" data-bs-toggle="pill" data-bs-target="#panel-reg">REGISTRO</button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" id="tab-config" data-bs-toggle="pill" data-bs-target="#panel-config">AJUSTES</button>
                    </li>
                </ul>

                <div class="tab-content mt-3">
                    <div class="tab-pane fade show active" id="panel-login">
                        <div class="mb-3">
                            <input type="text" id="login-user" class="form-control" placeholder="Nombre de usuario">
                        </div>
                        <div class="mb-3">
                            <input type="password" id="login-pass" class="form-control" placeholder="Contraseña">
                        </div>
                        <button class="btn btn-primary w-100 py-2" onclick="hacerLogin()">ENTRAR</button>
                    </div>

                    <div class="tab-pane fade" id="panel-reg">
                        <div class="mb-3">
                            <input type="text" id="reg-user" class="form-control" placeholder="Usuario">
                        </div>
                        <div class="mb-3">
                            <input type="email" id="reg-email" class="form-control" placeholder="Email">
                        </div>
                        <div class="mb-3">
                            <input type="password" id="reg-pass" class="form-control" placeholder="Contraseña">
                        </div>
                        <button class="btn btn-primary w-100 py-2" onclick="hacerRegister()">CREAR CUENTA</button>
                    </div>

                    <div class="tab-pane fade" id="panel-config">
                        <div id="config-guest" class="text-center py-3">
                            <p class="text-secondary small">Debes iniciar sesión para editar tu perfil.</p>
                            <button class="btn btn-outline-info btn-sm" onclick="document.getElementById('tab-login').click()">Ir al Login</button>
                        </div>
                        <div id="config-user" style="display:none;">
                            <label class="small text-secondary mb-1">Nuevo Email</label>
                            <input type="email" id="edit-email" class="form-control mb-3" placeholder="email@ejemplo.com">
                            <label class="small text-secondary mb-1">Nueva Contraseña</label>
                            <input type="password" id="edit-pass" class="form-control mb-3" placeholder="Mínimo 8 caracteres">
                            <button class="btn btn-primary w-100 mb-2" onclick="editarCuenta()">ACTUALIZAR DATOS</button>
                            <hr class="border-secondary my-4">
                            <button class="btn btn-outline-danger w-100 btn-sm" onclick="eliminarCuenta()">ELIMINAR CUENTA DEFINITIVAMENTE</button>
                        </div>
                    </div>
                </div>

                <div id="alerta-global" class="alert mt-4 d-none"></div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_BASE_URL = "https://marcovarasperez.duckdns.org/api/jugadores";

    function feedback(msg, tipo) {
        const al = document.getElementById('alerta-global');
        al.textContent = msg;
        al.className = `alert mt-4 alert-${tipo}`;
        al.classList.remove('d-none');
        setTimeout(() => al.classList.add('d-none'), 4000);
    }

    // Mostrar panel de ajustes solo si hay sesión
    document.getElementById('tab-config').addEventListener('shown.bs.tab', () => {
        const user = localStorage.getItem("rpg_usuario");
        if(user) {
            document.getElementById('config-guest').style.display = 'none';
            document.getElementById('config-user').style.display = 'block';
        } else {
            document.getElementById('config-guest').style.display = 'block';
            document.getElementById('config-user').style.display = 'none';
        }
    });

    async function hacerLogin() {
        const usuario = document.getElementById("login-user").value;
        const password = document.getElementById("login-pass").value;

        try {
            const res = await fetch(`${API_BASE_URL}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ usuario, password })
            });

            if (res.ok) {
                localStorage.setItem("rpg_usuario", usuario);
                feedback("✅ Sesión iniciada", "success");
                setTimeout(() => window.location.href = "menu.html", 1000);
            } else {
                feedback("❌ Usuario o contraseña incorrectos", "danger");
            }
        } catch (e) { feedback("📡 Error de conexión", "danger"); }
    }

    async function hacerRegister() {
        const usuario = document.getElementById("reg-user").value;
        const email = document.getElementById("reg-email").value;
        const password = document.getElementById("reg-pass").value;

        try {
            const res = await fetch(`${API_BASE_URL}/registro`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ usuario, email, password })
            });

            if (res.ok) {
                feedback("✨ Cuenta creada con éxito", "success");
                document.getElementById('tab-login').click();
            } else {
                const msg = await res.text();
                feedback("❌ Error: " + msg, "danger");
            }
        } catch (e) { feedback("📡 Error de conexión", "danger"); }
    }

    async function editarCuenta() {
        const usuario = localStorage.getItem("rpg_usuario");
        const nuevoEmail = document.getElementById("edit-email").value;
        const nuevaPass = document.getElementById("edit-pass").value;

        if (!usuario) return;

        try {
            // Actualizar Email si se ha rellenado
            if (nuevoEmail) {
                const resEmail = await fetch(`${API_BASE_URL}/actualizar/${usuario}/email?emailNuevo=${encodeURIComponent(nuevoEmail)}`, {
                    method: 'PATCH'
                });
                if (!resEmail.ok) throw new Error(await resEmail.text());
            }

            // Actualizar Password si se ha rellenado
            if (nuevaPass) {
                const passActual = prompt("Por seguridad, introduce tu contraseña actual:");
                if (!passActual) return;

                const resPass = await fetch(`${API_BASE_URL}/actualizar/${usuario}/password?passwordActual=${encodeURIComponent(passActual)}&passwordNueva=${encodeURIComponent(nuevaPass)}`, {
                    method: 'PATCH'
                });
                if (!resPass.ok) throw new Error(await resPass.text());
            }

            feedback("✅ Datos actualizados correctamente", "success");
            document.getElementById("edit-email").value = "";
            document.getElementById("edit-pass").value = "";
        } catch (error) {
            feedback("❌ Error: " + error.message, "danger");
        }
    }

    async function eliminarCuenta() {
        const user = localStorage.getItem("rpg_usuario");
        if(!user) return;

        if(confirm("¿Estás SEGURO? Se borrará todo tu progreso de forma permanente.")) {
            try {
                const res = await fetch(`${API_BASE_URL}/eliminar/usuario/${user}`, { method: 'DELETE' });
                if(res.ok) {
                    localStorage.clear();
                    feedback("Cuenta eliminada correctamente", "info");
                    setTimeout(() => location.reload(), 2000);
                } else {
                    feedback("❌ No se pudo eliminar la cuenta", "danger");
                }
            } catch (e) { feedback("📡 Error de conexión", "danger"); }
        }
    }

    window.onload = () => {
        const params = new URLSearchParams(window.location.search);
        if (params.get('action') === 'config') {
            const trigger = document.querySelector('#tab-config');
            bootstrap.Tab.getOrCreateInstance(trigger).show();
        }
    };
</script>
</body>
</html>
