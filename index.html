<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TFG - Login</title>
    <style>
        /* Estilos generales */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0d0d1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            color: #eee;
        }

        .caja {
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 12px;
            padding: 40px;
            width: 360px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        h1 {
            text-align: center;
            color: #e94560;
            margin-bottom: 8px;
            font-size: 1.6rem;
        }

        .subtitulo {
            text-align: center;
            color: #888;
            font-size: 0.85rem;
            margin-bottom: 28px;
        }

        /* Sistema de Tabs */
        .tabs {
            display: flex;
            margin-bottom: 24px;
            border-bottom: 1px solid #0f3460;
        }

        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            color: #888;
            transition: color 0.2s;
            font-size: 0.9rem;
        }

        .tab.activo {
            color: #e94560;
            border-bottom: 2px solid #e94560;
        }

        .panel { display: none; }
        .panel.activo { display: block; }

        /* Formularios */
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 14px;
            background: #0f3460;
            border: 1px solid #1a4a8a;
            border-radius: 6px;
            color: #eee;
            font-size: 0.95rem;
            outline: none;
        }

        input:focus { border-color: #e94560; }

        button {
            width: 100%;
            padding: 13px;
            background: #e94560;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        button:hover { background: #c73652; }
        button:disabled { background: #555; cursor: not-allowed; }

        .mensaje {
            text-align: center;
            margin-top: 14px;
            font-size: 0.88rem;
            min-height: 20px;
        }

        .error  { color: #e94560; }
        .exito  { color: #4ecca3; }
    </style>
</head>
<body>

<div class="caja">
    <h1>TFG</h1>
    <p class="subtitulo">Inicia sesión para continuar tu aventura</p>

    <div class="tabs">
        <div class="tab activo" id="tab-login" onclick="cambiarTab('login')">Iniciar sesión</div>
        <div class="tab" id="tab-register" onclick="cambiarTab('register')">Registrarse</div>
    </div>

    <div id="panel-login" class="panel activo">
        <input type="text" id="login-user" placeholder="Usuario" />
        <input type="password" id="login-pass" placeholder="Contraseña" />
        <button id="btn-login" onclick="hacerLogin()">Entrar al juego</button>
        <p class="mensaje" id="msg-login"></p>
    </div>

    <div id="panel-register" class="panel">
        <input type="text" id="reg-user" placeholder="Usuario" />
        <input type="email" id="reg-email" placeholder="Correo electrónico" /> 
        <input type="password" id="reg-pass" placeholder="Contraseña" />
        <button id="btn-reg" onclick="hacerRegister()">Crear cuenta</button>
        <p class="mensaje" id="msg-reg"></p>
    </div>
</div>

<script>
    // URL de tu API en Oracle Cloud a través de DuckDNS
    const API_BASE_URL = "https://marcovarasperez.duckdns.org/api/jugadores";

    // Función para cambiar entre pestañas de Login y Registro
    function cambiarTab(tab) {
        document.getElementById("tab-login").classList.toggle("activo", tab === 'login');
        document.getElementById("tab-register").classList.toggle("activo", tab === 'register');
        document.getElementById("panel-login").classList.toggle("activo", tab === 'login');
        document.getElementById("panel-register").classList.toggle("activo", tab === 'register');
        
        // Limpiar mensajes previos
        document.getElementById("msg-login").textContent = "";
        document.getElementById("msg-reg").textContent = "";
    }

    function mostrarMensaje(elId, texto, tipo) {
        const el = document.getElementById(elId);
        el.textContent = texto;
        el.className = "mensaje " + tipo;
    }

    // Lógica de Inicio de Sesión
    async function hacerLogin() {
        const usuario = document.getElementById("login-user").value.trim();
        const password = document.getElementById("login-pass").value;
        const btn = document.getElementById("btn-login");

        if (!usuario || !password) {
            mostrarMensaje("msg-login", "Rellena todos los campos", "error");
            return;
        }

        btn.disabled = true;
        btn.textContent = "Conectando...";

        try {
            const response = await fetch(`${API_BASE_URL}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ usuario, password })
            });

            if (response.ok) {
                const jugador = await response.json();
                mostrarMensaje("msg-login", `¡Bienvenido ${jugador.usuario}!`, "exito");
                
                // Guardar sesión localmente
                localStorage.setItem("rpg_usuario", jugador.usuario);
                
                setTimeout(() => {
                    window.location.href = "game.html"; 
                }, 1000);
            } else {
                mostrarMensaje("msg-login", "Usuario o contraseña incorrectos", "error");
                btn.disabled = false;
                btn.textContent = "Entrar al juego";
            }
        } catch (error) {
            console.error("Error:", error);
            mostrarMensaje("msg-login", "Error de conexión con el servidor", "error");
            btn.disabled = false;
            btn.textContent = "Entrar al juego";
        }
    }

    // Lógica de Registro de nuevo usuario
    async function hacerRegister() {
        const usuario = document.getElementById("reg-user").value.trim();
        const email = document.getElementById("reg-email").value.trim();
        const password = document.getElementById("reg-pass").value;
        const btn = document.getElementById("btn-reg");

        if (!usuario || !email || !password) {
            mostrarMensaje("msg-reg", "Rellena todos los campos", "error");
            return;
        }

        btn.disabled = true;
        btn.textContent = "Creando cuenta...";

        // Objeto con los datos que espera tu Backend
        const nuevoJugador = {
            usuario: usuario,
            password: password,
            email: email, 
            idMapa: 1,
            x: 10,
            y: 10,
            bit: 0,
            tiempoJuego: 0
        };

        try {
            const response = await fetch(`${API_BASE_URL}/registro`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(nuevoJugador)
            });

            if (response.ok) {
                mostrarMensaje("msg-reg", "¡Cuenta creada! Revisa tu email para el código.", "exito");
                setTimeout(() => cambiarTab('login'), 2000);
            } else if (response.status === 409) {
                // Manejo específico para el error de usuario/email duplicado
                mostrarMensaje("msg-reg", "El usuario o email ya está en uso", "error");
            } else {
                mostrarMensaje("msg-reg", "Error al registrarse", "error");
            }
        } catch (error) {
            console.error("Error:", error);
            mostrarMensaje("msg-reg", "Error de conexión", "error");
        } finally {
            btn.disabled = false;
            btn.textContent = "Crear cuenta";
        }
    }
</script>
</body>
</html>
