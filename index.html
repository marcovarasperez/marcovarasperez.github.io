<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="user-scalable=no">
    <link rel="icon" href="icon/icon.png" type="image/png">
    <link rel="apple-touch-icon" href="icon/icon.png">
    <link rel="stylesheet" type="text/css" href="fonts/gamefont.css">
    <title>ESCAPE ROOM TFG</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            background: black;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            width: 100vw !important;
            height: 100vh !important;
            image-rendering: pixelated;
        }
    </style>
</head>

<body style="background-color: black">
    <script type="text/javascript" src="js/libs/pixi.js"></script>
    <script type="text/javascript" src="js/libs/pixi-tilemap.js"></script>
    <script type="text/javascript" src="js/libs/pixi-picture.js"></script>
    <script type="text/javascript" src="js/libs/fpsmeter.js"></script>
    <script type="text/javascript" src="js/libs/lz-string.js"></script>
    <script type="text/javascript" src="js/libs/iphone-inline-video.browser.js"></script>
    <script type="text/javascript" src="js/rpg_core.js"></script>
    <script type="text/javascript" src="js/rpg_managers.js"></script>
    <script type="text/javascript" src="js/rpg_objects.js"></script>
    <script type="text/javascript" src="js/rpg_scenes.js"></script>
    <script type="text/javascript" src="js/rpg_sprites.js"></script>
    <script type="text/javascript" src="js/rpg_windows.js"></script>
    <script type="text/javascript" src="js/plugins.js"></script>
    <script type="text/javascript" src="js/main.js"></script>
    <script>
    window.addEventListener('load', function() {
        var canvas = document.querySelector('canvas');
        if (!canvas) return;

        function resize() {
            var winW = window.innerWidth;
            var winH = window.innerHeight;
            var gameW = 1280;
            var gameH = 720;
            var scaleX = winW / gameW;
            var scaleY = winH / gameH;
            var scale = Math.min(scaleX, scaleY);

            canvas.style.setProperty('width',  Math.floor(gameW * scale) + 'px', 'important');
            canvas.style.setProperty('height', Math.floor(gameH * scale) + 'px', 'important');
            canvas.style.setProperty('position', 'absolute', 'important');
            canvas.style.setProperty('left', Math.floor((winW - gameW * scale) / 2) + 'px', 'important');
            canvas.style.setProperty('top',  Math.floor((winH - gameH * scale) / 2) + 'px', 'important');
        }

        resize();
        window.addEventListener('resize', resize);
    });
</script>
</body>

</html>
