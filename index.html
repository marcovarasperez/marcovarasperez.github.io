<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TFG RPG - Acceso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --card-bg: rgba(30, 41, 59, 0.85); --primary-glow: #6366f1; }
        body {
            background: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.7)),
                        url('img/fondo.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Inter', sans-serif;
            min-height: 100vh; display: flex; align-items: center; margin: 0;
        }
        .auth-card {
            background: var(--card-bg); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px; padding: 2.5rem; box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .nav-pills .nav-link { color: #94a3b8; font-weight: 600; }
        .nav-pills .nav-link.active { background-color: var(--primary-glow); color: white; }
        .form-control { background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(255, 255, 255, 0.1); color: white; }
        
        /* Estilo del botón para ver contraseña */
        .pass-wrapper { position: relative; }
        .toggle-btn {
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
            background: none; border: 2px solid #475569; width: 14px; height: 14px;
            border-radius: 50%; cursor: pointer; transition: 0.3s; padding: 0;
        }
        .toggle-btn.active { background: #6366f1; border-color: #6366f1; box-shadow: 0 0 8px #6366f1; }
        
        .btn-primary { background: var(--primary-glow); border: none; font-weight: 700; padding: 12px; }
        .gradient-text {
            background: linear-gradient(to right, #818cf8, #e066ff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-weight: 800; font-size: 2.5rem;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-md-6 col-lg-5">
            <div class="auth-card text-center text-white">
                <h1 class="gradient-text mb-4">TFG RPG</h1>
                <ul class="nav nav-pills nav-fill mb-4">
                    <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#panel-login">LOGIN</button></li>
                    <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#panel-reg">REGISTRO</button></li>
                </ul>
                <div class="tab-content">
                    <div class="tab-pane fade show active" id="panel-login">
                        <input type="text" id="login-user" class="form-control mb-3" placeholder="Usuario">
                        <div class="pass-wrapper mb-3">
                            <input type="password" id="login-pass" class="form-control" placeholder="Contraseña">
                            <button class="toggle-btn" onclick="togglePass('login-pass', this)"></button>
                        </div>
                        <button class="btn btn-primary w-100" onclick="hacerLogin()">ENTRAR</button>
                    </div>
                    <div class="tab-pane fade" id="panel-reg">
                        <input type="text" id="reg-user" class="form-control mb-3" placeholder="Nuevo Usuario">
                        <input type="email" id="reg-email" class="form-control mb-3" placeholder="Email">
                        <div class="pass-wrapper mb-3">
                            <input type="password" id="reg-pass" class="form-control" placeholder="Contraseña">
                            <button class="toggle-btn" onclick="togglePass('reg-pass', this)"></button>
                        </div>
                        <button class="btn btn-primary w-100" onclick="hacerRegister()">CREAR CUENTA</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
    function togglePass(id, btn) {
        const input = document.getElementById(id);
        input.type = input.type === "password" ? "text" : "password";
        btn.classList.toggle('active');
    }
    // Aquí irían tus funciones hacerLogin() y hacerRegister()
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
