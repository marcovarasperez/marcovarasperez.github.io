<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TFG RPG - Mi Cuenta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; min-height: 100vh; }
        input::-ms-reveal { display: none; }

        .settings-card { 
            background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); 
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); 
        }

        .nav-link { color: #94a3b8; cursor: pointer; border-radius: 8px; margin-bottom: 5px; transition: 0.3s; }
        .nav-link:hover { background: rgba(255,255,255,0.05); }
        .nav-link.active { background: #6366f1 !important; color: white; font-weight: 600; }

        .form-control { background: #0f172a; border: 1px solid #334155; color: white; padding-right: 40px; }
        .form-control:disabled { background: #1e293b; color: #64748b; border-color: transparent; }

        /* Icono minimalista */
        .pass-wrapper { position: relative; }
        .toggle-btn {
            position: absolute; right: 12px; top: 12px;
            background: none; border: 2px solid #475569; width: 12px; height: 12px;
            border-radius: 50%; cursor: pointer; padding: 0;
        }
        .toggle-btn.active { background: #6366f1; border-color: #6366f1; }

        .btn-save { background: #6366f1; color: white; font-weight: 600; border: none; padding: 10px; }
        .btn-save:hover { background: #4f46e5; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-5">
        <h2 class="fw-800 m-0 text-white">Configuración</h2>
        <a href="menu.html" class="btn btn-outline-light btn-sm px-4" style="border-radius: 10px;">Volver</a>
    </div>

    <div class="row g-4">
        <div class="col-md-4">
            <div class="settings-card p-3">
                <nav class="nav flex-column">
                    <a class="nav-link active" id="l-perfil" onclick="swap('perfil')">👤 Datos de Usuario</a>
                    <a class="nav-link" id="l-seguridad" onclick="swap('seguridad')">🔒 Seguridad</a>
                    <hr class="border-secondary my-3">
                    <a class="nav-link text-danger" onclick="borrarCuenta()">⚠️ Eliminar Cuenta</a>
                </nav>
            </div>
        </div>

        <div class="col-md-8">
            <div class="settings-card p-4">
                
                <div id="s-perfil">
                    <h5 class="mb-4">Información del Perfil</h5>
                    <div class="mb-3">
                        <label class="small text-secondary mb-1">Nombre de Usuario</label>
                        <input type="text" id="display-user" class="form-control" disabled>
                    </div>
                    <div class="mb-4">
                        <label class="small text-secondary mb-1">Cambiar Correo Electrónico</label>
                        <input type="email" id="new-email" class="form-control" placeholder="ejemplo@correo.com">
                    </div>
                    <button class="btn btn-save w-100" onclick="updateEmail()">Guardar cambios de Email</button>
                </div>

                <div id="s-seguridad" class="d-none">
                    <h5 class="mb-4">Seguridad de la Cuenta</h5>
                    <div class="mb-4">
                        <label class="small text-secondary mb-1">Nueva Contraseña</label>
                        <div class="pass-wrapper">
                            <input type="password" id="new-pass" class="form-control" placeholder="Mínimo 8 caracteres">
                            <button class="toggle-btn" onclick="togglePass('new-pass', this)"></button>
                        </div>
                    </div>
                    <div class="alert alert-info py-2 small">Nota: Se solicitará tu clave actual para validar el cambio.</div>
                    <button class="btn btn-save w-100" onclick="updatePass()">Actualizar Contraseña</button>
                </div>

            </div>
        </div>
    </div>
</div>

<script>
    const API = "https://marcovarasperez.duckdns.org/api/jugadores";
    const user = localStorage.getItem("rpg_usuario");

    if(!user) window.location.href = "index.html";
    document.getElementById("display-user").value = user;

    function togglePass(id, btn) {
        const input = document.getElementById(id);
        const isPass = input.type === "password";
        input.type = isPass ? "text" : "password";
        btn.classList.toggle('active', isPass);
    }

    function swap(sec) {
        document.getElementById('s-perfil').classList.toggle('d-none', sec !== 'perfil');
        document.getElementById('s-seguridad').classList.toggle('d-none', sec !== 'seguridad');
        document.getElementById('l-perfil').classList.toggle('active', sec === 'perfil');
        document.getElementById('l-seguridad').classList.toggle('active', sec === 'seguridad');
    }

    async function updateEmail() {
        const mail = document.getElementById("new-email").value;
        if(!mail) return alert("Ingresa un email válido");

        try {
            const res = await fetch(`${API}/actualizar/${user}/email?emailNuevo=${encodeURIComponent(mail)}`, { method: 'PATCH' });
            if(res.ok) alert("✅ Correo actualizado con éxito");
            else alert("❌ Error: " + await res.text());
        } catch (e) { alert("Error de conexión"); }
    }

    async function updatePass() {
        const pass = document.getElementById("new-pass").value;
        if(pass.length < 8) return alert("La clave debe tener al menos 8 caracteres");
        
        const old = prompt("Por favor, introduce tu contraseña ACTUAL:");
        if(!old) return;

        try {
            const url = `${API}/actualizar/${user}/password?passwordActual=${encodeURIComponent(old)}&passwordNueva=${encodeURIComponent(pass)}`;
            const res = await fetch(url, { method: 'PATCH' });
            if(res.ok) {
                alert("✅ Contraseña cambiada correctamente");
                document.getElementById("new-pass").value = "";
            } else {
                alert("❌ Error: " + await res.text());
            }
        } catch (e) { alert("Error de conexión"); }
    }

    async function borrarCuenta() {
        if(confirm("¿Estás 100% seguro? Esta acción borrará todos tus datos para siempre.")) {
            try {
                const res = await fetch(`${API}/eliminar/usuario/${user}`, { method: 'DELETE' });
                if(res.ok) {
                    localStorage.clear();
                    window.location.href = "index.html";
                } else {
                    alert("No se pudo eliminar la cuenta");
                }
            } catch (e) { alert("Error de red"); }
        }
    }
</script>
</body>
</html>
