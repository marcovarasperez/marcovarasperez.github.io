<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TFG RPG - Acceso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg-dark: #0f172a; --card-bg: rgba(30, 41, 59, 0.8); --primary-glow: #6366f1; }
        input::-ms-reveal, input::-ms-clear { display: none; } /* Quitar ojo nativo */

        body {
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            font-family: 'Inter', sans-serif; color: #f8fafc;
            min-height: 100vh; display: flex; align-items: center;
        }

        .auth-card {
            background: var(--card-bg); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px; padding: 2rem; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .nav-pills .nav-link { color: #94a3b8; font-weight: 600; border-radius: 10px; border: none; }
        .nav-pills .nav-link.active { background-color: var(--primary-glow); color: white; }

        .form-control { background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(255, 255, 255, 0.1); color: white; padding-right: 40px; }
        .form-control:focus { background: rgba(15, 23, 42, 1); color: white; border-color: var(--primary-glow); box-shadow: none; }

        .btn-primary { background: var(--primary-glow); border: none; font-weight: 700; }

        /* Icono de visibilidad minimalista */
        .pass-wrapper { position: relative; }
        .toggle-btn {
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
            background: none; border: 2px solid #94a3b8; width: 14px; height: 14px;
            border-radius: 50%; cursor: pointer; transition: 0.2s; padding: 0;
        }
        .toggle-btn.active { background: #6366f1; border-color: #6366f1; box-shadow: 0 0 8px #6366f1; }

        .gradient-text {
            background: linear-gradient(to right, #818cf8, #e066ff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-weight: 800; font-size: 2.5rem;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-md-6 col-lg-5">
            <div class="auth-card text-center">
                <h1 class="gradient-text mb-4">TFG RPG</h1>
                
                <ul class="nav nav-pills nav-fill mb-4">
                    <li class="nav-item">
                        <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#panel-login">LOGIN</button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" data-bs-toggle="pill" data-bs-target="#panel-reg">REGISTRO</button>
                    </li>
                </ul>

                <div class="tab-content">
                    <div class="tab-pane fade show active" id="panel-login">
                        <input type="text" id="login-user" class="form-control mb-3" placeholder="Usuario">
                        <div class="pass-wrapper mb-3">
                            <input type="password" id="login-pass" class="form-control" placeholder="Contraseña">
                            <button class="toggle-btn" onclick="toggleView('login-pass', this)" title="Ver contraseña"></button>
                        </div>
                        <button class="btn btn-primary w-100 py-2" onclick="hacerLogin()">ENTRAR</button>
                    </div>

                    <div class="tab-pane fade" id="panel-reg">
                        <input type="text" id="reg-user" class="form-control mb-3" placeholder="Nuevo Usuario">
                        <input type="email" id="reg-email" class="form-control mb-3" placeholder="Email">
                        <div class="pass-wrapper mb-3">
                            <input type="password" id="reg-pass" class="form-control" placeholder="Contraseña">
                            <button class="toggle-btn" onclick="toggleView('reg-pass', this)"></button>
                        </div>
                        <button class="btn btn-primary w-100 py-2" onclick="hacerRegister()">CREAR CUENTA</button>
                    </div>
                </div>
                <div id="alerta-global" class="alert mt-4 d-none small"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const API_BASE = "https://marcovarasperez.duckdns.org/api/jugadores";

    function toggleView(id, btn) {
        const input = document.getElementById(id);
        if (input.type === "password") {
            input.type = "text";
            btn.classList.add('active');
        } else {
            input.type = "password";
            btn.classList.remove('active');
        }
    }

    function feedback(msg, tipo) {
        const al = document.getElementById('alerta-global');
        al.textContent = msg;
        al.className = `alert mt-4 alert-${tipo}`;
        al.classList.remove('d-none');
    }

    async function hacerLogin() {
        const usuario = document.getElementById("login-user").value;
        const password = document.getElementById("login-pass").value;
        try {
            const res = await fetch(`${API_BASE}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ usuario, password })
            });
            if (res.ok) {
                localStorage.setItem("rpg_usuario", usuario);
                window.location.href = "menu.html";
            } else { feedback("❌ Datos incorrectos", "danger"); }
        } catch (e) { feedback("📡 Error de conexión", "danger"); }
    }

    async function hacerRegister() {
        const usuario = document.getElementById("reg-user").value;
        const email = document.getElementById("reg-email").value;
        const password = document.getElementById("reg-pass").value;
        try {
            const res = await fetch(`${API_BASE}/registro`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ usuario, email, password })
            });
            if (res.ok) {
                feedback("✅ Registro OK", "success");
                setTimeout(() => location.reload(), 1000);
            } else {
                feedback("❌ Error: " + await res.text(), "danger");
            }
        } catch (e) { feedback("📡 Error de servidor", "danger"); }
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
