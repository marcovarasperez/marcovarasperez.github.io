<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TFG RPG - Configuración</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; min-height: 100vh; }
        .settings-container { max-width: 900px; margin-top: 5rem; }
        .settings-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); overflow: hidden; }
        .sidebar { background: rgba(15, 23, 42, 0.5); border-right: 1px solid rgba(255,255,255,0.05); padding: 2rem 1rem; }
        .nav-link { color: #94a3b8; border-radius: 10px; margin-bottom: 0.5rem; transition: 0.3s; font-weight: 500; border: none; background: transparent; width: 100%; text-align: left; padding: 0.8rem 1.2rem; }
        .nav-link:hover { background: rgba(99, 102, 241, 0.1); color: #818cf8; }
        .nav-link.active { background: #6366f1; color: white; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); }
        .form-control { background: #1e293b; border: 1px solid #334155; color: white; }
        .form-control:focus { background: #1e293b; border-color: #6366f1; box-shadow: none; color: white; }
        .btn-save { background: #6366f1; border: none; font-weight: 600; padding: 0.6rem 2rem; }
    </style>
</head>
<body>

<div class="container settings-container">
    <div class="mb-4">
        <a href="menu.html" class="text-decoration-none text-secondary small">← Volver al menú principal</a>
        <h2 class="fw-bold mt-2">Ajustes de Cuenta</h2>
    </div>

    <div class="row settings-card g-0 shadow-lg">
        <div class="col-md-4 sidebar">
            <nav class="nav flex-column">
                <button class="nav-link active" onclick="showSection('perfil', this)">👤 Perfil</button>
                <button class="nav-link" onclick="showSection('seguridad', this)">🔒 Seguridad</button>
                <button class="nav-link" onclick="showSection('datos', this)">💾 Datos de Juego</button>
                <hr class="text-secondary">
                <button class="nav-link text-danger" onclick="confirmarEliminar()">🗑️ Eliminar Cuenta</button>
            </nav>
        </div>

        <div class="col-md-8 p-4 p-lg-5">
            <div id="section-perfil">
                <h4 class="mb-4">Información Personal</h4>
                <div class="mb-3">
                    <label class="form-label text-secondary small">Nombre de Usuario</label>
                    <input type="text" id="display-user" class="form-control" readonly>
                </div>
                <div class="mb-4">
                    <label class="form-label text-secondary small">Email</label>
                    <input type="email" id="display-email" class="form-control" placeholder="cargando...">
                </div>
                <button class="btn btn-save">Actualizar Perfil</button>
            </div>

            <div id="section-seguridad" class="d-none">
                <h4 class="mb-4">Seguridad</h4>
                <div class="mb-3">
                    <label class="form-label text-secondary small">Nueva Contraseña</label>
                    <input type="password" class="form-control">
                </div>
                <div class="mb-4">
                    <label class="form-label text-secondary small">Repetir Contraseña</label>
                    <input type="password" class="form-control">
                </div>
                <button class="btn btn-save">Cambiar Contraseña</button>
            </div>
        </div>
    </div>
</div>

<script>
    const user = localStorage.getItem("rpg_usuario");
    if(!user) window.location.href = "index.html";
    document.getElementById("display-user").value = user;

    function showSection(section, btn) {
        // Ocultar todas
        document.getElementById('section-perfil').classList.add('d-none');
        document.getElementById('section-seguridad').classList.add('d-none');
        // Quitar active de botones
        document.querySelectorAll('.nav-link').forEach(b => b.classList.remove('active'));
        
        // Mostrar seleccionada
        document.getElementById('section-' + section).classList.remove('d-none');
        btn.classList.add('active');
    }

    function confirmarEliminar() {
        if(confirm("¿Estás seguro de que quieres borrar tu progreso para siempre?")) {
            alert("Cuenta eliminada (Simulación)");
            localStorage.clear();
            window.location.href = "index.html";
        }
    }
</script>
</body>
</html>
