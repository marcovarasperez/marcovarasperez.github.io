<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TFG RPG - Mi Cuenta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)),
                        url('img/fondo.png') no-repeat center center fixed;
            background-size: cover;
            color: #f8fafc; font-family: 'Inter', sans-serif; 
            min-height: 100vh; display: flex; align-items: center; margin: 0;
        }
        .settings-card {
            background: rgba(30, 41, 59, 0.85); backdrop-filter: blur(15px);
            border-radius: 24px; border: 1px solid rgba(255,255,255,0.1);
            max-width: 650px; margin: auto; padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }
        .form-control { background: #0f172a; border: 1px solid #334155; color: white; padding: 12px; }
        .form-control:focus { border-color: #6366f1; box-shadow: none; background: #0f172a; color: white; }
        
        .section-title { border-left: 4px solid #6366f1; padding-left: 15px; margin-bottom: 20px; font-weight: 800; color: #818cf8; font-size: 0.9rem; letter-spacing: 1px; }
        
        .pass-group { position: relative; }
        .eye-btn {
            position: absolute; right: 12px; top: 38px; cursor: pointer; color: #94a3b8;
        }

        .divider { border-top: 1px solid rgba(255,255,255,0.1); margin: 30px 0; }
        .btn-save { background: #6366f1; border: none; font-weight: 700; padding: 15px; transition: 0.3s; }
        .btn-save:hover { background: #4f46e5; transform: scale(1.02); }
    </style>
</head>
<body>
<div class="container py-5">
    <div class="settings-card">
        <div class="text-center mb-5">
            <h2 class="fw-800 text-white">Configuración de Cuenta</h2>
            <p class="text-secondary">Actualiza tu identidad y seguridad en un solo lugar</p>
        </div>

        <div class="section-title text-uppercase">Datos de Perfil</div>
        <div class="mb-3">
            <label class="form-label small text-secondary fw-600">Nombre de Usuario</label>
            <input type="text" id="edit-user" class="form-control">
        </div>
        <div class="mb-3">
            <label class="form-label small text-secondary fw-600">Correo Electrónico</label>
            <input type="email" id="edit-email" class="form-control">
        </div>

        <div class="divider"></div>

        <div class="section-title text-uppercase">Seguridad y Contraseña</div>
        <div class="mb-4 pass-group">
            <label class="form-label small text-secondary fw-600">Contraseña Actual</label>
            <input type="password" id="pass-actual" class="form-control" placeholder="Necesaria para cualquier cambio">
            <span class="eye-btn" onclick="ver('pass-actual')">👁️</span>
        </div>

        <div class="row g-3">
            <div class="col-md-6 pass-group">
                <label class="form-label small text-secondary fw-600">Nueva Contraseña</label>
                <input type="password" id="pass-nueva" class="form-control">
                <span class="eye-btn" onclick="ver('pass-nueva')">👁️</span>
            </div>
            <div class="col-md-6 pass-group">
                <label class="form-label small text-secondary fw-600">Repetir Nueva</label>
                <input type="password" id="pass-repetir" class="form-control">
                <span class="eye-btn" onclick="ver('pass-repetir')">👁️</span>
            </div>
        </div>

        <button class="btn btn-primary btn-save w-100 mt-5" onclick="guardarCambios()">GUARDAR TODOS LOS CAMBIOS</button>
        
        <div class="text-center mt-4">
            <a href="menu.html" class="text-secondary small text-decoration-none">← Cancelar y volver al menú</a>
            <hr class="opacity-10">
            <button class="btn btn-link text-danger btn-sm text-decoration-none" onclick="eliminarCuenta()">Eliminar cuenta permanentemente</button>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://marcovarasperez.duckdns.org/api/jugadores";
    const usuarioLogueado = localStorage.getItem("rpg_usuario");

    if (!usuarioLogueado) window.location.href = "index.html";
    document.getElementById("edit-user").value = usuarioLogueado;

    function ver(id) {
        const el = document.getElementById(id);
        el.type = el.type === "password" ? "text" : "password";
    }

    async function guardarCambios() {
        const nuevoUser = document.getElementById("edit-user").value.trim();
        const nuevoEmail = document.getElementById("edit-email").value.trim();
        const pActual = document.getElementById("pass-actual").value;
        const pNueva = document.getElementById("pass-nueva").value;
        const pRepetir = document.getElementById("pass-repetir").value;

        if (!pActual) return alert("❌ Debes introducir tu contraseña actual para confirmar.");

        try {
            // 1. Actualizar Email
            if (nuevoEmail) {
                await fetch(`${API_URL}/actualizar/${usuarioLogueado}/email?emailNuevo=${encodeURIComponent(nuevoEmail)}`, { method: 'PATCH' });
            }

            // 2. Actualizar Password
            if (pNueva) {
                if (pNueva !== pRepetir) return alert("❌ Las nuevas contraseñas no coinciden");
                const resP = await fetch(`${API_URL}/actualizar/${usuarioLogueado}/password?passwordActual=${encodeURIComponent(pActual)}&passwordNueva=${encodeURIComponent(pNueva)}`, { method: 'PATCH' });
                if (!resP.ok) throw new Error("Contraseña actual incorrecta");
            }

            // 3. Actualizar Usuario
            if (nuevoUser && nuevoUser !== usuarioLogueado) {
                const resU = await fetch(`${API_URL}/actualizar/${usuarioLogueado}/usuario?usuarioNuevo=${encodeURIComponent(nuevoUser)}`, { method: 'PATCH' });
                if (resU.ok) localStorage.setItem("rpg_usuario", nuevoUser);
            }

            alert("✅ ¡Cambios aplicados correctamente!");
            location.reload();

        } catch (e) { alert("❌ Error: " + e.message); }
    }

    async function eliminarCuenta() {
        if (confirm("⚠️ ¿Estás seguro? Se borrará todo tu progreso para siempre.")) {
            const res = await fetch(`${API_URL}/eliminar/usuario/${usuarioLogueado}`, { method: 'DELETE' });
            if (res.ok) {
                localStorage.clear();
                window.location.href = "index.html";
            }
        }
    }
</script>
</body>
</html>
