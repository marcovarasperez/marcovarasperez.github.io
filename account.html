<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TFG RPG - Mi Cuenta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)),
                        url('./img/fondo/fondo.png') no-repeat center center fixed;
            background-size: cover;
            color: #f8fafc; font-family: 'Inter', sans-serif; min-height: 100vh;
            display: flex; align-items: center;
        }
        .settings-card {
            background: rgba(30, 41, 59, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 24px; border: 1px solid rgba(255,255,255,0.1);
            max-width: 600px; margin: auto; padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .form-control { background: #0f172a; border: 1px solid #334155; color: white; padding: 12px; }
        .form-control:focus { background: #0f172a; color: white; border-color: #6366f1; box-shadow: none; }
        .section-title { border-left: 4px solid #6366f1; padding-left: 15px; margin-bottom: 20px; font-weight: 800; font-size: 0.9rem; color: #818cf8; }
        .divider { border-top: 1px solid rgba(255,255,255,0.1); margin: 25px 0; }
        .btn-save { background: #6366f1; border: none; font-weight: 700; padding: 14px; transition: 0.3s; }
        .btn-save:hover { background: #4f46e5; transform: translateY(-2px); }
        .password-wrapper {
            position: relative;
        }
        .password-wrapper .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #94a3b8;
            z-index: 10;
        }
        .password-wrapper .toggle-password:hover { color: #6366f1; }
    </style>
</head>
<body>
<div class="container py-4">
    <div class="settings-card">
        <div class="text-center mb-4">
            <h2 class="fw-800 text-white">Configuración de Cuenta</h2>
            <p class="text-secondary small">Actualiza tu identidad y seguridad en un solo lugar</p>
        </div>

        <div class="section-title text-uppercase">Datos de Perfil</div>
        <div class="mb-3">
            <label class="form-label small text-secondary fw-600">Nombre de Usuario</label>
            <input type="text" id="edit-user" class="form-control" readonly disabled>
            <small class="text-secondary">El nombre de usuario no se puede modificar</small>
        </div>
        <div class="mb-3">
            <label class="form-label small text-secondary fw-600">Correo Electrónico</label>
            <input type="email" id="edit-email" class="form-control" placeholder="nuevo@correo.com">
        </div>

        <div class="divider"></div>

        <div class="section-title text-uppercase">Seguridad</div>
        <div class="mb-3">
            <label class="form-label small text-secondary fw-600">Contraseña Actual</label>
            <div class="password-wrapper">
                <input type="password" id="pass-actual" class="form-control" placeholder="Obligatorio para confirmar">
                <i class="fas fa-eye toggle-password" onclick="togglePassword('pass-actual', this)"></i>
            </div>
        </div>
        <div class="row g-2">
            <div class="col-6">
                <label class="form-label small text-secondary fw-600">Nueva Contraseña</label>
                <div class="password-wrapper">
                    <input type="password" id="pass-nueva" class="form-control">
                    <i class="fas fa-eye toggle-password" onclick="togglePassword('pass-nueva', this)"></i>
                </div>
            </div>
            <div class="col-6">
                <label class="form-label small text-secondary fw-600">Repetir Nueva</label>
                <div class="password-wrapper">
                    <input type="password" id="pass-repetir" class="form-control">
                    <i class="fas fa-eye toggle-password" onclick="togglePassword('pass-repetir', this)"></i>
                </div>
            </div>
        </div>

        <button class="btn btn-primary w-100 mt-5 btn-save" onclick="actualizarTodo()">GUARDAR CAMBIOS</button>
        
        <div class="text-center mt-4">
            <a href="menu.html" class="text-secondary small text-decoration-none">← Cancelar y volver</a>
            <br><br>
            <button class="btn btn-link text-danger btn-sm text-decoration-none" onclick="confirmarEliminar()">Eliminar cuenta permanentemente</button>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://marcovarasperez.duckdns.org/api/jugadores";
    const usuarioLogueado = localStorage.getItem("rpg_usuario");

    if (!usuarioLogueado) window.location.href = "index.html";
    else document.getElementById("edit-user").value = usuarioLogueado;

    function togglePassword(inputId, iconElement) {
        const input = document.getElementById(inputId);
        if (input.type === "password") {
            input.type = "text";
            iconElement.classList.remove("fa-eye");
            iconElement.classList.add("fa-eye-slash");
        } else {
            input.type = "password";
            iconElement.classList.remove("fa-eye-slash");
            iconElement.classList.add("fa-eye");
        }
    }

    async function actualizarTodo() {
        const nuevoEmail = document.getElementById("edit-email").value.trim();
        const passActual = document.getElementById("pass-actual").value;
        const passNueva = document.getElementById("pass-nueva").value;
        const passRepetir = document.getElementById("pass-repetir").value;

        if (!passActual) return alert("Debes introducir tu contraseña actual.");
        
        if (passNueva && passNueva !== passRepetir) return alert("Las nuevas contraseñas no coinciden.");

        try {
            // Actualizar Email
            if (nuevoEmail) {
                const resEmail = await fetch(`${API_URL}/actualizar/${usuarioLogueado}/email?emailNuevo=${encodeURIComponent(nuevoEmail)}`, { 
                    method: 'PATCH' 
                });
                if (!resEmail.ok) {
                    const error = await resEmail.text();
                    throw new Error(error || "Error al actualizar email");
                }
                alert("✅ Email actualizado correctamente");
                document.getElementById("edit-email").value = "";
            }
            
            // Actualizar Password
            if (passNueva) {
                const resPass = await fetch(`${API_URL}/actualizar/${usuarioLogueado}/password?passwordActual=${encodeURIComponent(passActual)}&passwordNueva=${encodeURIComponent(passNueva)}`, { 
                    method: 'PATCH' 
                });
                if (!resPass.ok) {
                    const error = await resPass.text();
                    throw new Error(error || "Contraseña actual incorrecta");
                }
                alert("✅ Contraseña actualizada correctamente");
                document.getElementById("pass-actual").value = "";
                document.getElementById("pass-nueva").value = "";
                document.getElementById("pass-repetir").value = "";
            }

            if (!nuevoEmail && !passNueva) {
                alert("No se realizó ningún cambio");
            }
        } catch (e) { 
            alert("❌ " + e.message); 
        }
    }

    async function confirmarEliminar() {
        if(confirm("⚠️ ¿Borrar cuenta? Esta acción es irreversible. ⚠️")) {
            const res = await fetch(`${API_URL}/eliminar/usuario/${usuarioLogueado}`, { method: 'DELETE' });
            if(res.ok) { 
                localStorage.clear(); 
                alert("Cuenta eliminada correctamente");
                window.location.href = "index.html"; 
            } else {
                alert("Error al eliminar la cuenta");
            }
        }
    }
</script>
</body>
</html>
